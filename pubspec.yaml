name: messenger
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ">=2.16.1 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.2
  firebase_core: ^1.12.0
  flutterfire_ui: ^0.3.4
  firebase_auth: ^3.3.7
  firebase_storage: ^10.2.9
  google_sign_in: ^5.2.4
  cloud_firestore: ^3.1.8
  intl: ^0.17.0
  shared_preferences: ^2.0.13
  fluttertoast: ^8.0.9
  image_picker: ^0.8.4+11
  cached_network_image: ^3.2.0
  photo_view: any


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0
  flutter_launcher_icons: ^0.9.2

flutter_icons:
  image_path: "assets/images/logo.png"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
   - assets/images/
   - assets/images/mimes
